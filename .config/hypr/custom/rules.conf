# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

workspace = special:music, on-created-empty:/usr/bin/chromium --app="https://music.youtube.com"
workspace = special:facebook, on-created-empty:/usr/bin/chromium --profile-directory=Default --app-id=kippjfofjhjlffjecoapiogbkgbpmgej
workspace = special:float_terminal, on-created-empty:[float] foot -T FloatingTerminal
# workspace = special:gemini, on-created-empty:firefox --profile /home/aj/AJ/.firefox/hehe/ --new-window "https://gemini.google.com/app" --kiosk
# workspace = special:gemini, on-created-empty:[float] chromium --app="https://gemini.google.com/app"
# workspace = special:chatgpt, on-created-empty:[float] chromium --app="https://chatgpt.com"
workspace = special:hyprSettings, on-created-empty:code /home/aj/.config/hypr
workspace = special:agsSettings,on-created-empty:code /home/aj/.config/ags
workspace = special:task_manager,on-created-empty:gnome-system-monitor
workspace = special:btop,on-created-empty:foot btop

windowrulev2 = size 99% 40%, title:FloatingTerminal
windowrulev2 = move 0.5% 59.5%, title:FloatingTerminal
windowrulev2 = opacity 0.85, title:FloatingTerminal
windowrulev2 = noblur, title:FloatingTerminal

windowrulev2 = size 30% 94.5%,class:^chrome-([a-z]+\.)*[a-z]+\.com(__[a-z\-]*Default)
windowrulev2 = move 0.5% 5%, class:^chrome-([a-z]+\.)*[a-z]+\.com(__[a-z\-]*Default)

